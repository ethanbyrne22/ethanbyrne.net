backend:
  name: git-gateway
  branch: main

media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "projects"
    label: "Projects"
    folder: "src/projects"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["order", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Brand / Client", name: "brand", widget: "string" }
      - { label: "Role", name: "role", widget: "string" }
      - { label: "Kicker", name: "kicker", widget: "string", hint: "Category label above headline (e.g. Campaign, Sports, Commercial)" }
      - { label: "Date", name: "date", widget: "datetime", required: false, hint: "Project date — shown on the detail page" }
      - { label: "Display Order", name: "order", widget: "number", value_type: "int", min: 1, hint: "Lower numbers appear first. Projects 1-2 get top placement." }
      - { label: "Featured (Below Fold)", name: "featured", widget: "boolean", default: false, hint: "Show in the below-the-fold 3-up grid" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Thumbnail", name: "thumbnail", widget: "image" }
      - label: "Thumbnail Aspect Ratio"
        name: "thumbnail_aspect"
        widget: "select"
        options: ["landscape", "portrait", "square"]
        default: "landscape"
        required: false
      - { label: "Thumbnail Caption", name: "thumbnail_caption", widget: "string", required: false }
      - { label: "Thumbnail Video URL", name: "thumbnail_video_url", widget: "string", required: false, hint: "YouTube or Vimeo URL to use as the thumbnail instead of an image. Autoplays muted and loops." }
      - { label: "Video URL (Legacy)", name: "video_url", widget: "string", required: false, hint: "Single video URL — use Videos list below instead for multiple videos." }
      - label: "Videos"
        name: "videos"
        widget: "list"
        required: false
        hint: "Add one or more YouTube or Vimeo URLs. These display as embedded videos on the project page."
        fields:
          - { label: "Video URL", name: "url", widget: "string" }
          - { label: "Caption", name: "caption", widget: "string", required: false }
      - label: "Gallery Images"
        name: "images"
        widget: "list"
        fields:
          - { label: "Image", name: "url", widget: "image" }
          - label: "Aspect Ratio"
            name: "aspect"
            widget: "select"
            options: ["landscape", "portrait", "square"]
            default: "landscape"
            required: false
            hint: "Portrait images will be displayed smaller or paired side-by-side on project pages."

  - name: "letters"
    label: "Letters from the Editors"
    folder: "src/letters"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Excerpt", name: "excerpt", widget: "string", required: false, hint: "Short summary for previews" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General"
        name: "site"
        file: "src/_data/site.json"
        fields:
          - { label: "Site Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Instagram Handle", name: "instagram", widget: "string" }
          - { label: "Clients List", name: "clients", widget: "text", hint: "Separate with · (middle dot)" }
          - { label: "About Photo", name: "about_photo", widget: "image" }
          - { label: "About Photo (Hover)", name: "about_photo_hover", widget: "image", required: false, hint: "Second photo revealed on hover" }
          - { label: "About Title", name: "about_title", widget: "string" }
          - { label: "About Bio (HTML)", name: "about_bio", widget: "text", hint: "Wrap paragraphs in <p> tags" }
          - { label: "Hero Video URL", name: "hero_video_url", widget: "string", required: false, hint: "YouTube or Vimeo URL for the lead story on the home page. Autoplays muted." }
